name: Bug report
description: Report reproducible behavior in portawhip
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for helping improve portawhip. Remove secrets and private prompts from all output.
  - type: input
    id: version
    attributes:
      label: Portawhip version
      placeholder: 0.1.0
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options: [Windows, macOS, Linux, Other]
    validations:
      required: true
  - type: input
    id: host
    attributes:
      label: Agent host
      placeholder: Codex, Claude Code, Gemini CLI, Cursor, ...
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Include the exact command, expected result, actual result, and sanitized output.
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Safety check
      options:
        - label: I removed credentials, private prompts, and machine-specific secrets.
          required: true
