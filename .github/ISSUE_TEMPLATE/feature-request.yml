name: Feature request
description: Suggest a focused capability, host, or workflow improvement
title: "feat: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What agent workflow is difficult today?
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      description: Describe the user-visible result, not only an implementation.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Host or capability evidence
      description: Link official documentation when the request depends on a host API or format.
