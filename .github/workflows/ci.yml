name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Node ${{ matrix.node }} / ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: [20, 22]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm test

  release-gates:
    name: Release gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # portawhip must work with no capability provider installed. CI has none
      # installed anyway, so `npm test` above already covers the bare case —
      # this run pins it explicitly so the guarantee does not depend on CI
      # happening to be bare. The gap this does NOT close is the linked case:
      # nothing here proves portawhip still works WITH a provider. That needs
      # the router published or linked, and is verified locally for now.
      - run: PORTAWHIP_DISABLE_PROVIDERS=all npm test
      - run: npm run sync-config -- --backend agent-skill-manager
      - run: npm run tui -- --summary
      - run: npm audit --audit-level=high
      - run: npm pack --dry-run
