# Each entry declares WHAT capability to load. MCP entries are staged in
# `.rulesync/mcp.json`; Rulesync is the only host-config writer. mise owns CLI
# tools, while agent-skill-manager is reserved for long-tail skill hosts.
- id: context7
  type: mcp
  source: https://mcp.context7.com/mcp
  route:
    triggers: ["library docs", "api docs", "documentation", "how to use", "sdk usage", "package docs"]
    description: "Fetch current docs/examples for a library, framework, or API"
    skipWhen: ["local code symbols or call paths", "non-technical tasks"]
    when: [user_prompt]
    inject: hint

- id: ripgrep
  type: cli
  source: ripgrep
  route:
    triggers: ["search codebase", "grep", "find text in files", "regex search"]
    description: "Fast regex search across files"
    skipWhen: ["symbol caller or dependency tracing", "binary document extraction"]
    when: [user_prompt]
    inject: hint
    binary: rg

- id: pdf
  # id matches the skill's real installed name (not "anthropic-skills") on
  # purpose: registry.mjs dedupes curated vs. auto-discovered entries by id,
  # and this skill also gets auto-discovered once installed (asm reports it
  # as "pdf" in every host's skill dir). Matching ids lets the curated,
  # deliberately-authored route win outright instead of competing on score
  # against a separately-discovered duplicate of the same capability.
  type: skill
  source: github:anthropics/skills
  path: skills/pdf
  route:
    triggers: ["pdf", "merge pages", "ocr", "extract table"]
    description: "Read/merge/split/OCR PDF files"
    skipWhen: ["plain text or markdown files", "spreadsheet or slide editing"]
    when: [user_prompt]
    inject: hint

- id: codegraph
  # Same curated-override-wins pattern as pdf above: codegraph is already
  # auto-discovered (installed globally as an MCP server), but it also
  # needs a per-project .codegraph/ index before it's actually usable here.
  # Observed live: the router suggested codegraph in THIS repo, which has
  # no .codegraph/ — readyMarker/readyHint let the suggestion say so
  # instead of silently implying it just works.
  type: mcp
  source: codegraph
  route:
    triggers: ["codegraph", "code graph", "call graph", "blast radius", "symbol graph"]
    description: "MCP server: codebase knowledge graph (symbols, edges, call paths)"
    skipWhen: ["plain text search", "non-code documents"]
    when: [user_prompt]
    inject: hint
    readyMarker: ".codegraph"
    readyHint: "codegraph init"

# Routing ships as the separate portawhip-router package, so this entry
# describes a capability that exists only once the user installs it. install is
# false because portawhip never pulls a provider in on its own — see the
# provider seam in core/state/capability-providers.mjs.
- id: harness-router
  type: mcp
  source: portawhip-router
  args: ["--yes", "--package=portawhip-router", "--", "harness-router"]
  install: false
  name: harness-router
  scope: project
  route:
    triggers:
      [
        "harness-router",
        "portawhip",
        "hybrid-router.mjs",
        "sparse-retriever.mjs",
        "router-cli.mjs",
        "fix the router",
        "improve the router",
      ]
    description: "Inspect or improve this repo's harness-router/portawhip routing source"
    skipWhen: ["using an installed capability without changing the router", "unrelated product routing"]
    when: [user_prompt]
    inject: hint
    action: inspect_code

- id: portawhip
  # This repo's own management skill (skills/portawhip/SKILL.md). Curated so
  # the router surfaces it when the user talks about importing/syncing tools
  # across hosts. install:false — it lives in-repo and is read via the pointer,
  # like the other instruction-backed skills below.
  type: skill
  source: portawhip
  path: .rulesync/skills/portawhip
  install: false
  route:
    triggers:
      [
        "import capability",
        "import tool",
        "sync tools across hosts",
        "share skill across hosts",
        "fan out to all hosts",
        "manage portawhip",
        "surface coverage matrix",
        "what capabilities are synced",
        "import newly installed",
      ]
    description: "Manage portawhip cross-host capability sync: import, enrich, check coverage, fan out to all hosts"
    skipWhen: ["ordinary application feature work", "single-host local-only configuration"]
    when: [user_prompt]
    inject: hint
    action: read_skill

- id: workspace-surface-audit
  type: skill
  source: workspace-surface-audit
  install: false
  route:
    triggers:
      [
        "ecc:harness-audit",
        "harness audit",
        "audit connector",
        "audit hook",
        "connector audit",
        "hook audit",
        "mcp audit",
        "workspace surface audit",
        "harness surface",
      ]
    description: "Audit the active repo, MCP servers, connectors, hooks, plugins, and ECC harness surface"
    skipWhen: ["implementing application features", "invoking one already-known tool"]
    when: [user_prompt]
    inject: hint
    action: read_skill

- id: rulesync
  type: config-sync
  source: rulesync
  install: false
  route:
    triggers:
      [
        "sync claude codex config",
        "sync config",
        "config drift",
        "copy skills to codex",
        "copy skills to claude",
        "sync mcp config",
        "sync hooks permissions",
        "claude codex drift",
      ]
    description: "Sole steady-state fan-out writer for project and global host configuration"
    skipWhen: ["one-off capability use", "reading configuration without syncing it"]
    when: [user_prompt]
    inject: hint
    action: run_sync_config

- id: agent-skill-manager-sync-probe
  type: config-sync
  source: agent-skill-manager
  install: false
  route:
    triggers:
      [
        "agent-skill-manager",
        "asm providers",
        "skill providers",
        "skills installed across hosts",
        "sync skills",
      ]
    description: "Probe or install skills only for long-tail hosts rulesync cannot target"
    skipWhen: ["hosts already covered by rulesync", "non-skill configuration surfaces"]
    when: [user_prompt]
    inject: hint
    action: run_sync_config_status

- id: configure-ecc
  type: skill
  source: configure-ecc
  install: false
  route:
    triggers:
      [
        "update-config",
        "update config",
        "settings.json hook",
        "claude code settings",
        "codex config",
        "mcp config",
        "configure ecc",
        "hook troubleshooting",
        "fix config",
      ]
    description: "Configure or repair ECC/Codex/Claude harness config, hooks, settings, and MCP wiring"
    skipWhen: ["application runtime configuration", "ordinary source-code changes"]
    when: [user_prompt]
    inject: hint
    action: read_skill

- id: verification-loop
  type: skill
  source: verification-loop
  install: false
  route:
    triggers:
      [
        "verify",
        "verification",
        "run tests",
        "test before commit",
        "pre commit verification",
        "quality gate",
        "fix bug and run tests",
      ]
    description: "Run build/test/lint/security verification after code changes and before commits"
    skipWhen: ["read-only explanation with no code changes", "work that has not reached verification"]
    when: [user_prompt]
    inject: hint
    action: read_skill

- id: code-review
  type: skill
  source: code-review
  install: false
  route:
    triggers:
      [
        "code-review",
        "code review",
        "review changed code",
        "review before commit",
        "bug fix review",
        "pull request review",
      ]
    description: "Review changed code for bugs, regressions, missing tests, and maintainability before commit"
    skipWhen: ["implementing the requested change", "non-code document review"]
    when: [user_prompt]
    inject: hint
    action: review_code
